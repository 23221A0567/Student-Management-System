<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Admin Panel</h2>

<h4>Users</h4>
<table class="table">
<tr><th>Name</th><th>Email</th><th>Phone</th></tr>

{% for u in users %}
<tr>
<td>{{ u['name'] }}</td>
<td>{{ u['email'] }}</td>
<td>{{ u['phone'] }}</td>
</tr>
{% endfor %}
</table>

<h4>Student Data</h4>
<table class="table">
<tr><th>Name</th><th>Course</th><th>Action</th></tr>

{% for s in students %}
<tr>
<td>{{ s['name'] }}</td>
<td>{{ s['course'] }}</td>
<td>
    <a href="/delete/{{ s['id'] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

<a href="/logout" class="btn btn-dark">Logout</a>

</div>
</body>
</html>
