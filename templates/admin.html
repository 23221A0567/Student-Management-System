<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Admin Panel</h2>

    <h4 class="mt-4">Users</h4>
    <table class="table table-bordered">
        <tr>
            <th>Name</th><th>Email</th><th>Phone</th><th>Age</th>
        </tr>

        {% for u in users %}
        <tr>
            <td>{{ u[1] }}</td>
            <td>{{ u[2] }}</td>
            <td>{{ u[3] }}</td>
            <td>{{ u[4] }}</td>
        </tr>
        {% endfor %}
    </table>

    <h4 class="mt-4">Student Data</h4>
    <table class="table table-bordered">
        <tr>
            <th>Name</th><th>Course</th><th>Action</th>
        </tr>

        {% for s in students %}
        <tr>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
            <td>
                <a href="/delete/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="/logout" class="btn btn-dark">Logout</a>

</div>

</body>
</html>
