<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(45deg, #0d6efd, #6610f2);
            color: white;
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="header mb-4">
        <h2>👑 Admin Dashboard</h2>
        <p>Manage Users & Student Data</p>
    </div>

    <!-- USERS CARD -->
    <div class="card p-3 mb-4">
        <h4>👥 Users</h4>

        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td>{{ u['name'] }}</td>
                    <td>{{ u['email'] }}</td>
                    <td>{{ u['phone'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- STUDENT CARD -->
    <div class="card p-3">
        <h4>🎓 Student Data</h4>

        <table class="table table-striped">
            <thead class="table-primary">
                <tr>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s['name'] }}</td>
                    <td>{{ s['course'] }}</td>
                    <td>
                        <a href="/delete/{{ s['id'] }}" class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- LOGOUT -->
    <div class="mt-4">
        <a href="/logout" class="btn btn-dark">Logout</a>
    </div>

</div>

</body>
</html>
