<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #74ebd5, #ACB6E5);">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">🎓 Student System</span>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="card p-4 shadow-lg">
        <form action="/add" method="post" class="row g-3">
            <input type="text" name="name" class="form-control col" placeholder="Name" required>
            <input type="text" name="age" class="form-control col" placeholder="Age" required>
            <input type="text" name="course" class="form-control col" placeholder="Course" required>
            <button class="btn btn-success col">Add</button>
        </form>
    </div>

    <div class="card mt-4 p-3 shadow-lg">
        <form action="/search" method="post">
            <input type="text" name="keyword" class="form-control mb-3" placeholder="Search by name">
        </form>

        <table class="table">
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Action</th>
            </tr>

            {% for s in students %}
            <tr>
                <td>{{ s['name'] }}</td>
                <td>{{ s['course'] }}</td>
                <td>
                    <a href="/update/{{ s['id'] }}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="/delete/{{ s['id'] }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>
</body>
</html>
