<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Logout Button -->
    <a href="/logout" class="btn btn-danger float-end">Logout</a>

    <h2 class="text-center mb-4">🎓 Student Management System</h2>

    <!-- ADD FORM -->
    <div class="card p-4 shadow">
        <form action="/add" method="post" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="name" class="form-control" placeholder="Name" required>
            </div>
            <div class="col-md-3">
                <input type="text" name="age" class="form-control" placeholder="Age" required>
            </div>
            <div class="col-md-3">
                <input type="text" name="course" class="form-control" placeholder="Course" required>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100">Add</button>
            </div>
        </form>
    </div>

    <!-- SEARCH + TABLE -->
    <div class="card mt-4 p-3 shadow">

        <!-- SEARCH -->
        <form action="/search" method="post" class="mb-3">
            <input type="text" name="keyword" placeholder="🔍 Search by name..." class="form-control">
        </form>

        <!-- TABLE -->
        <table class="table table-striped table-hover text-center align-middle">
            
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% if students|length == 0 %}
                <tr>
                    <td colspan="4" class="text-center text-muted">No students found</td>
                </tr>
                {% else %}
                    {% for s in students %}
                    <tr>
                        <td>{{ s[1] }}</td>
                        <td>{{ s[2] }}</td>
                        <td>{{ s[3] }}</td>
                        <td>
                            <a href="/update/{{ s[0] }}" class="btn btn-warning btn-sm">Edit</a>
                            <a href="/delete/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                {% endif %}
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
