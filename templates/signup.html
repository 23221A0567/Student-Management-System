<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 col-md-4 mx-auto">

<h3 class="text-center">Signup</h3>

<form method="post">
<input name="name" class="form-control mb-2" placeholder="Name">
<input name="email" class="form-control mb-2" placeholder="Email">
<input name="phone" class="form-control mb-2" placeholder="Phone">
<input name="age" class="form-control mb-2" placeholder="Age">
<input type="password" name="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-success w-100">Signup</button>
</form>

</div>
</div>

</body>
</html>
