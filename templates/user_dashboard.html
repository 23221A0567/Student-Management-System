<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h3>User Dashboard</h3>

    <form method="post" action="/add" class="mb-3">
        <input name="name" class="form-control mb-2" placeholder="Student Name" required>
        <input name="course" class="form-control mb-2" placeholder="Course" required>
        <button class="btn btn-primary">Add Student</button>
    </form>

    <table class="table">
        <tr><th>Name</th><th>Course</th></tr>

        {% for s in students %}
        <tr>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/logout" class="btn btn-dark">Logout</a>

</div>

</body>
</html>
