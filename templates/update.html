<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    
    <h2 class="text-center mb-4">✏️ Update Student</h2>

    <div class="card p-4 shadow">

        <form method="post">

            <label class="form-label">Name</label>
            <input type="text" name="name" value="{{ student[1] }}" class="form-control mb-3" required>

            <label class="form-label">Age</label>
            <input type="text" name="age" value="{{ student[2] }}" class="form-control mb-3" required>

            <label class="form-label">Course</label>
            <input type="text" name="course" value="{{ student[3] }}" class="form-control mb-3" required>

            <button class="btn btn-success w-100 mb-2">Update</button>

            <a href="/" class="btn btn-secondary w-100">Back</a>

        </form>

    </div>

</div>

</body>
</html>
